# Lives at the repo root on purpose. Cloudflare Workers Builds runs
# `npx wrangler deploy` from here, and npm workspaces need the install to
# happen here too, so a config in api/ means every default command fails with
# an error that names the wrong problem.
name = "onebook-api"
main = "api/src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# Public origins. EDIT THESE before deploying — they drive CORS and every
# OAuth redirect URI, so leaving localhost here means a deployed Worker will
# reject your real frontend.
#
#   APP_ORIGIN  where the dashboard is served (Cloudflare Pages)
#   API_ORIGIN  where this Worker is served
#
# Deliberately a single environment: a half-configured [env.production] block
# makes it far too easy to deploy the wrong origins without noticing.
# ---------------------------------------------------------------------------
# workers.dev gives this Worker its public URL. Preview URLs are switched off
# deliberately: they mint extra public hostnames for a service that holds
# encrypted brokerage tokens, and OAuth redirect URIs are registered per-origin
# so a preview host could never complete a broker connection anyway.
workers_dev = true
preview_urls = false

[vars]
# APP_ORIGIN must match wherever the dashboard is actually served. It is the
# CORS allowlist, so a stale value here silently blocks the real frontend.
APP_ORIGIN = "http://localhost:5173"
API_ORIGIN = "https://onebook-api.arinjain-mail.workers.dev"
MARKET_DATA_PROVIDER = "alpaca"
# Data feed. Both "iex" and "delayed_sip" are free; "sip" needs a paid Alpaca
# subscription. "delayed_sip" gives the full consolidated tape on a 15-minute
# delay, which suits risk analytics better than IEX-only volume in real time.
ALPACA_DATA_FEED = "delayed_sip"
# Logs magic links to the console instead of emailing them. Set to "0" once
# email delivery is wired up.
DEV_LOG_MAGIC_LINKS = "1"

# Create with:  npx wrangler d1 create onebook
# Paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "onebook"
database_id = "0f5b2c3b-8f95-457b-ba5d-66aafaf418db"

# Create with:  npx wrangler kv namespace create onebook-kv
# Paste the returned id below.
[[kv_namespaces]]
binding = "KV"
id = "4eaf9f7d6f254d4c879aa7725d1111da"

# Secrets are never committed. Set each with `npx wrangler secret put <NAME>`
# (or in the Cloudflare dashboard under Settings → Variables and Secrets):
#
#   TOKEN_ENCRYPTION_KEY    openssl rand -base64 32
#   STATE_SIGNING_SECRET    openssl rand -base64 32
#   ALPACA_API_KEY_ID       from alpaca.markets (works with paper keys)
#   ALPACA_API_SECRET_KEY
#   ALPHA_VANTAGE_API_KEY   optional fallback provider
#   SCHWAB_CLIENT_ID / SCHWAB_CLIENT_SECRET
#   TRADIER_CLIENT_ID / TRADIER_CLIENT_SECRET
#
# For local dev, put the same names in .dev.vars at the repo root (gitignored).
